<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19 Notes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>

<h1>19 Notes</h1>

<div class="search-container">
    <input id="searchInput" type="text" placeholder="Search notes...">
</div>

<form class="note-app" onsubmit="addNote(event)">
    <input id="noteTitle" type="text" placeholder="Note title..." maxlength="50">
    <textarea id="noteInput" placeholder="Write a note..." autofocus></textarea>
    <div class="char-count">
        <span id="charCount">0</span> / <span id="charLimit">500</span> characters
    </div>
    <button type="submit" aria-label="Add a new note">Add Note</button>
</form>

<div id="emptyState" class="empty-state">No notes yet. Create one to get started! 📝</div>

<ul id="notesList"></ul>

<script src="script.js"></script>
</body>
</html>
